<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة X O</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --primary: #3b82f6;
      --primary-dark: #1d4ed8;
      --text: #0f172a;
      --muted: #475569;
      --x: #ef4444;
      --o: #10b981;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Tajawal", "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(160deg, #eef2ff, var(--bg));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .game-card {
      width: min(95vw, 520px);
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      padding: 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 4vw, 2rem);
      color: var(--primary-dark);
    }

    .subtitle {
      margin: 0 0 16px;
      color: var(--muted);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    button, select {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 1rem;
      font-family: inherit;
    }

    select {
      background: #e2e8f0;
      color: #0f172a;
      cursor: pointer;
    }

    button {
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.2s ease;
    }

    button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .status {
      font-weight: 700;
      margin: 10px 0 18px;
      min-height: 24px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .cell {
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      background: #f1f5f9;
      border: 2px solid #dbe5f0;
      font-size: clamp(2rem, 9vw, 3.2rem);
      font-weight: 800;
      color: var(--text);
      display: grid;
      place-items: center;
      user-select: none;
      transition: background-color 0.2s ease;
    }

    .cell.x { color: var(--x); }
    .cell.o { color: var(--o); }
    .cell.win {
      background: #dbeafe;
      border-color: #93c5fd;
    }

    .score {
      display: flex;
      justify-content: space-between;
      margin-top: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 14px;
      color: #1e293b;
      font-weight: 600;
      gap: 8px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <main class="game-card">
    <h1>لعبة X O</h1>
    <p class="subtitle">اختر نمط اللعب واستمتع 👇</p>

    <div class="controls">
      <select id="mode-select" aria-label="نمط اللعب">
        <option value="pvp">لاعب ضد لاعب</option>
        <option value="cpu">لاعب ضد الكمبيوتر</option>
      </select>
      <button id="restart-btn">إعادة اللعبة</button>
      <button id="reset-score-btn">تصفير النقاط</button>
    </div>

    <p id="status" class="status">دور اللاعب X</p>

    <section id="board" class="board" aria-label="لوحة لعبة X O"></section>

    <div class="score">
      <span>فوز X: <strong id="score-x">0</strong></span>
      <span>فوز O: <strong id="score-o">0</strong></span>
      <span>تعادل: <strong id="score-draw">0</strong></span>
    </div>
  </main>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restart-btn');
    const resetScoreBtn = document.getElementById('reset-score-btn');
    const modeSelect = document.getElementById('mode-select');

    const scoreXEl = document.getElementById('score-x');
    const scoreOEl = document.getElementById('score-o');
    const scoreDrawEl = document.getElementById('score-draw');

    const WIN_LINES = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6],
    ];

    let board = Array(9).fill('');
    let currentPlayer = 'X';
    let gameOver = false;
    let scores = { X: 0, O: 0, draw: 0 };

    function initBoard() {
      boardEl.innerHTML = '';
      board.forEach((value, index) => {
        const cell = document.createElement('button');
        cell.className = 'cell';
        cell.dataset.index = index;
        cell.textContent = value;
        if (value === 'X') cell.classList.add('x');
        if (value === 'O') cell.classList.add('o');
        cell.addEventListener('click', onCellClick);
        boardEl.appendChild(cell);
      });
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function updateScoreUI() {
      scoreXEl.textContent = scores.X;
      scoreOEl.textContent = scores.O;
      scoreDrawEl.textContent = scores.draw;
    }

    function getWinner(currentBoard) {
      for (const line of WIN_LINES) {
        const [a, b, c] = line;
        if (
          currentBoard[a] &&
          currentBoard[a] === currentBoard[b] &&
          currentBoard[a] === currentBoard[c]
        ) {
          return { player: currentBoard[a], line };
        }
      }
      return null;
    }

    function highlightWin(line) {
      line.forEach((index) => {
        const cell = boardEl.querySelector(`[data-index="${index}"]`);
        if (cell) cell.classList.add('win');
      });
    }

    function onCellClick(event) {
      const idx = Number(event.currentTarget.dataset.index);
      if (gameOver || board[idx]) return;

      makeMove(idx, currentPlayer);

      if (!gameOver && modeSelect.value === 'cpu' && currentPlayer === 'O') {
        setStatus('دور الكمبيوتر...');
        setTimeout(playCpuMove, 300);
      }
    }

    function makeMove(index, player) {
      board[index] = player;
      initBoard();

      const winner = getWinner(board);
      if (winner) {
        gameOver = true;
        scores[player] += 1;
        updateScoreUI();
        setStatus(`انتهت اللعبة! الفائز هو ${player}`);
        highlightWin(winner.line);
        return;
      }

      if (board.every(Boolean)) {
        gameOver = true;
        scores.draw += 1;
        updateScoreUI();
        setStatus('تعادل!');
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      setStatus(`دور اللاعب ${currentPlayer}`);
    }

    function playCpuMove() {
      if (gameOver) return;
      const empty = board
        .map((cell, idx) => (cell ? null : idx))
        .filter((value) => value !== null);

      const randomIndex = Math.floor(Math.random() * empty.length);
      const move = empty[randomIndex];
      makeMove(move, 'O');
    }

    function restartGame() {
      board = Array(9).fill('');
      currentPlayer = 'X';
      gameOver = false;
      setStatus('دور اللاعب X');
      initBoard();
    }

    restartBtn.addEventListener('click', restartGame);
    resetScoreBtn.addEventListener('click', () => {
      scores = { X: 0, O: 0, draw: 0 };
      updateScoreUI();
      restartGame();
    });

    modeSelect.addEventListener('change', restartGame);

    initBoard();
    updateScoreUI();
  </script>
</body>
</html>
